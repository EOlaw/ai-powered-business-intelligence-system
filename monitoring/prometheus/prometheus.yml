# InsightSerenity — Prometheus Configuration
# ===========================================
# Scrapes metrics from all platform services.
# Deploy with: helm install prometheus prometheus-community/kube-prometheus-stack

global:
  scrape_interval:     15s    # Scrape every 15 seconds
  evaluation_interval: 15s    # Evaluate rules every 15 seconds
  external_labels:
    cluster:     insightserenity
    environment: production

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

# ── Rules ─────────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/*.yml

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # API Gateway — Fastify exposes metrics at /metrics (via prom-client)
  - job_name: api-gateway
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [insightserenity-production]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: api-gateway
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        replacement: $1:3000
    metrics_path: /metrics

  # AI Engine — Python FastAPI with prometheus-fastapi-instrumentator
  - job_name: ai-engine
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [insightserenity-production]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: ai-engine
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        replacement: $1:8001
    metrics_path: /metrics

  # PostgreSQL Exporter
  - job_name: postgres-exporter
    static_configs:
      - targets: [postgres-exporter:9187]

  # Redis Exporter
  - job_name: redis-exporter
    static_configs:
      - targets: [redis-exporter:9121]

  # Node Exporter (host metrics for K8s nodes)
  - job_name: node-exporter
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*):10250'
        replacement: '$1:9100'
        target_label: __address__

  # Kubernetes API server
  - job_name: kubernetes-apiservers
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
