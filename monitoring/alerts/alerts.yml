# InsightSerenity — Prometheus Alert Rules
# ==========================================
# Critical alerts that page on-call. Warning alerts go to Slack only.
#
# Severity levels:
#   critical  → Page immediately (PagerDuty)
#   warning   → Slack notification
#   info      → Dashboard annotation only

groups:

  # ── API Gateway Alerts ────────────────────────────────────────────────────
  - name: api-gateway
    rules:

      - alert: GatewayHighErrorRate
        expr: |
          rate(http_requests_total{job="api-gateway", status_code=~"5.."}[5m])
          / rate(http_requests_total{job="api-gateway"}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary:     "API Gateway error rate > 5%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors (threshold: 5%)"
          runbook:     "https://runbooks.insightserenity.com/api-gateway-errors"

      - alert: GatewayHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary:     "API Gateway p95 latency > 2s"
          description: "p95 response time is {{ $value }}s (threshold: 2s)"

      - alert: GatewayDown
        expr: up{job="api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "API Gateway is unreachable"
          description: "Prometheus cannot scrape the API gateway — all instances may be down"
          runbook: "https://runbooks.insightserenity.com/gateway-down"

  # ── AI Engine Alerts ──────────────────────────────────────────────────────
  - name: ai-engine
    rules:

      - alert: AiEngineDown
        expr: up{job="ai-engine"} == 0
        for: 2m
        labels:
          severity: critical
          team: ml
        annotations:
          summary: "AI Engine is unreachable"
          description: "The inference engine pod is not responding — all completions will fail"
          runbook: "https://runbooks.insightserenity.com/ai-engine-down"

      - alert: AiEngineHighInferenceLatency
        expr: |
          histogram_quantile(0.95,
            rate(inference_duration_seconds_bucket{job="ai-engine"}[5m])
          ) > 10
        for: 5m
        labels:
          severity: warning
          team: ml
        annotations:
          summary:     "AI Engine p95 inference latency > 10s"
          description: "Generation is taking {{ $value }}s at p95 — model may need optimization"

      - alert: AiEngineHighGpuMemory
        expr: nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes > 0.90
        for: 3m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "GPU memory usage > 90%"
          description: "GPU {{ $labels.gpu }} is at {{ $value | humanizePercentage }} memory — OOM risk"

  # ── Database Alerts ───────────────────────────────────────────────────────
  - name: database
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL is unreachable"
          runbook: "https://runbooks.insightserenity.com/postgres-down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > pg_settings_max_connections * 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "PostgreSQL connection count > 85% of max"
          description: "{{ $value }} active connections (85% of max_connections)"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Redis is unreachable — rate limiting and queues will fail"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is at {{ $value | humanizePercentage }} of its memory limit"

  # ── Business Metrics ──────────────────────────────────────────────────────
  - name: business
    rules:

      - alert: HighRateLimitRate
        expr: |
          rate(api_key_rate_limited_total[5m]) / rate(http_requests_total{job="api-gateway"}[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "High rate-limit rejection rate > 10%"
          description: "{{ $value | humanizePercentage }} of requests are being rate-limited — users may need plan upgrades"

  # ── Infrastructure ────────────────────────────────────────────────────────
  - name: infrastructure
    rules:

      - alert: NodeHighCpuUsage
        expr: 100 - (avg by (node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node CPU usage > 85%"
          description: "Node {{ $labels.node }} CPU is at {{ $value }}%"

      - alert: PodCrashLooping
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace=~"insightserenity.*"}[30m]) > 3
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash-looping"
          description: "{{ $value }} restarts in 30 minutes"
          runbook: "https://runbooks.insightserenity.com/pod-crashloop"

  # ── Model Version & Data Flywheel ─────────────────────────────────────────
  - name: model-health
    rules:

      - alert: StaleModel
        expr: |
          (time() - insightserenity_active_model_promoted_at_unix) > 30 * 86400
        for: 1h
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "Serving model has not been updated in over 30 days"
          description: >
            Model {{ $labels.model_name }}:{{ $labels.model_version }} was promoted
            {{ $value | humanizeDuration }} ago. Trigger a training run to keep the
            model up to date with new corpus data.
          runbook: "https://runbooks.insightserenity.com/stale-model"

      - alert: ModelNotTracked
        expr: |
          absent(insightserenity_active_model_promoted_at_unix)
        for: 5m
        labels:
          severity: warning
          team: ml
        annotations:
          summary: "AI engine is not reporting a model version metric"
          description: >
            insightserenity_active_model_promoted_at_unix is missing from Prometheus.
            Either the AI engine is down or no model has been promoted yet.

      - alert: GatewayHighRateLimitRate
        expr: |
          sum(rate(insightserenity_gateway_rate_limited_total[5m]))
          / sum(rate(insightserenity_gateway_requests_total[5m])) > 0.15
        for: 5m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Gateway rate-limit rejection rate > 15%"
          description: >
            {{ $value | humanizePercentage }} of requests are being rate-limited.
            Users may need plan upgrades or the rate limits need adjustment.
