# InsightSerenity — Continuous Integration
# ==========================================
# Runs on every push and pull request to main/develop.
# Fails fast: lint → typecheck → unit tests → integration tests
# Must pass before any CD pipeline can deploy.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API Gateway ──────────────────────────────────────────────────────────────
  gateway-ci:
    name: API Gateway — Lint, Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-gateway

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       insightserenity_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:                    test
      DATABASE_URL:                postgresql://test:test@localhost:5432/insightserenity_test
      REDIS_URL:                   redis://localhost:6379
      JWT_ACCESS_SECRET:           test_access_secret_at_least_32_chars_long
      JWT_REFRESH_SECRET:          test_refresh_secret_at_least_32_chars_long
      AI_ENGINE_URL:               http://localhost:8001
      SERVING_INTERNAL_API_SECRET: test-internal-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --reporter=verbose

  # ── AI Engine ─────────────────────────────────────────────────────────────────
  ai-engine-ci:
    name: AI Engine — Lint, Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check src/

      - name: Typecheck (mypy)
        run: python -m mypy src/ --ignore-missing-imports

      - name: Unit tests
        run: python -m pytest tests/unit -v --tb=short

  # ── Docker build validation ──────────────────────────────────────────────────
  docker-build:
    name: Validate Docker builds
    runs-on: ubuntu-latest
    needs: [gateway-ci, ai-engine-ci]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api-gateway.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ai-engine image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/ai-engine.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
