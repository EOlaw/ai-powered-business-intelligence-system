apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: insightserenity-production

commonLabels:
  environment: production

patches:
  # Production: 3+ replicas, higher resource limits
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

images:
  - name: insightserenity/api-gateway
    newTag: latest
  - name: insightserenity/ai-engine
    newTag: latest
