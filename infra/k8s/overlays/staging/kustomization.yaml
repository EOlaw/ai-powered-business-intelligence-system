apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: insightserenity-staging

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  # Staging: single replica for cost savings
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

images:
  - name: insightserenity/api-gateway
    newTag: staging
  - name: insightserenity/ai-engine
    newTag: staging
